<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feOffset dx="2" dy="2" result="offsetBlur" />
      <feMerge>
        <feMergeNode in="offsetBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Arched Wings -->
  <g transform="translate(300, 150)">
    <!-- Left Wing -->
    <path d="M-80,0 C-150,-20 -220,20 -250,100 C-200,80 -150,60 -80,40 Z" fill="url(#gold-grad)" />
    <path d="M-80,20 C-160,10 -230,50 -260,120 C-210,100 -160,80 -80,60 Z" fill="url(#gold-grad)" opacity="0.8" />
    <path d="M-80,40 C-170,40 -240,80 -270,140 C-220,120 -170,100 -80,80 Z" fill="url(#gold-grad)" opacity="0.6" />
    
    <!-- Right Wing -->
    <path d="M80,0 C150,-20 220,20 250,100 C200,80 150,60 80,40 Z" fill="url(#gold-grad)" />
    <path d="M80,20 C160,10 230,50 260,120 C210,100 160,80 80,60 Z" fill="url(#gold-grad)" opacity="0.8" />
    <path d="M80,40 C170,40 240,80 270,140 C220,120 170,100 80,80 Z" fill="url(#gold-grad)" opacity="0.6" />
  </g>

  <!-- Car Silhouette -->
  <path d="M220,180 C220,165 240,155 300,155 C360,155 380,165 380,180 L395,205 H205 Z" fill="#222" />
  <path d="M200,205 H400 L410,225 H190 Z" fill="#D4AF37" />
  <rect x="230" y="160" width="140" height="5" fill="#D4AF37" rx="2" />

  <!-- 5 Stars -->
  <g transform="translate(300, 130)">
    <path d="M0,-30 L5,-15 H20 L10,-5 L15,10 L0,0 L-15,10 L-10,-5 L-20,-15 H-5 Z" fill="#FFD700" />
    <path d="M-60,-15 L-55,0 H-40 L-50,10 L-45,25 L-60,15 L-75,25 L-70,10 L-80,0 H-65 Z" fill="#D4AF37" scale="0.8" />
    <path d="M60,-15 L65,0 H80 L70,10 L75,25 L60,15 L45,25 L50,10 L40,0 H55 Z" fill="#D4AF37" scale="0.8" />
    <path d="M-110,10 L-105,25 H-90 L-100,35 L-95,50 L-110,40 L-125,50 L-120,35 L-130,25 H-115 Z" fill="#B8860B" scale="0.7" />
    <path d="M110,10 L115,25 H130 L120,35 L125,50 L110,40 L95,50 L100,35 L90,25 H105 Z" fill="#B8860B" scale="0.7" />
  </g>

  <!-- Text Section -->
  <text x="300" y="320" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-weight="900" font-size="52" fill="url(#gold-grad)" style="text-transform: uppercase; letter-spacing: 2px;">G P TOURS &amp; TRAVELS</text>
  
  <!-- Divider Line -->
  <rect x="100" y="340" width="400" height="3" fill="url(#gold-grad)" rx="1.5" />
  
  <!-- Tagline -->
  <text x="300" y="380" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-weight="400" font-size="32" fill="#D4AF37" style="font-style: italic; letter-spacing: 4px;">any time... any where</text>
</svg>
